<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customize Sass Variables</title>

    <link rel="stylesheet" href="../../../css/bootstrap.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .custom-card {
            max-width: 850px;
            margin: 50px auto;
            border-radius: 20px;
        }

        .custom-primary {
            background-color: #6f42c1;
            color: white;
        }

        .custom-btn {
            background-color: #6f42c1;
            color: white;
            border-radius: 30px;
            padding: 10px 24px;
            border: none;
        }

        .custom-btn:hover {
            background-color: #59359a;
            color: white;
        }

        pre {
            background-color: #212529;
            color: white;
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="card custom-card border-0 shadow">
            <div class="custom-primary p-4">
                <h1 class="fw-bold">Customized Bootstrap Style</h1>
                <p class="mb-0">
                    Primary color and border radius can be changed using Sass variables.
                </p>
            </div>

            <div class="card-body p-4">
                <h4 class="fw-bold">_variables.scss</h4>

                <pre>$primary: #6f42c1;
$border-radius: 1rem;
$border-radius-pill: 50rem;</pre>

                <h4 class="fw-bold mt-4">custom.scss</h4>

                <pre>@import "variables";
@import "../node_modules/bootstrap/scss/bootstrap";</pre>

                <button class="custom-btn mt-3" type="button" onclick="showMessage()">
                    Custom Button
                </button>

                <p id="message" class="mt-3 text-success fw-bold"></p>
            </div>
        </div>

    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML = "Custom Bootstrap style applied successfully.";
        }
    </script>

    <script src="../../../js/bootstrap.bundle.min.js"></script>

</body>
</html>
