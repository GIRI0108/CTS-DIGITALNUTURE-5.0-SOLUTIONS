<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Popup</title>

    <link rel="stylesheet" href="../../../css/bootstrap.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .main-card {
            max-width: 700px;
            margin: 60px auto;
            border-radius: 12px;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="card main-card border-0 shadow">
            <div class="card-body p-4">
                <h1 class="fw-bold text-primary">Course Confirmation</h1>

                <p class="text-muted fs-5">
                    Click the button to open a Bootstrap modal popup.
                </p>

                <button class="btn btn-primary" type="button" data-bs-toggle="modal" data-bs-target="#courseModal">
                    Open Modal
                </button>
            </div>
        </div>

    </div>

    <div class="modal fade" id="courseModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-primary text-white">
                    <h5 class="modal-title">Course Registration</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">
                    Your Bootstrap practice course has been selected successfully.
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        Close
                    </button>

                    <button type="button" class="btn btn-primary">
                        Continue
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="../../../js/bootstrap.bundle.min.js"></script>

</body>
</html>
