<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Floating Login Form</title>

    <link rel="stylesheet" href="../../../css/bootstrap.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .login-box {
            max-width: 420px;
            margin: 70px auto;
            background-color: white;
            border-radius: 10px;
        }

        .profile-circle {
            width: 60px;
            height: 60px;
            background-color: #0d6efd;
            color: white;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            margin: auto;
        }
    </style>
</head>
<body>

    <div class="container">

        <div class="login-box shadow-sm p-4">
            <div class="text-center mb-4">
                <div class="profile-circle mb-3">ST</div>
                <h1 class="fw-bold text-primary">Student Login</h1>
                <p class="text-muted mb-0">
                    Sign in to continue learning.
                </p>
            </div>

            <form>
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com">
                    <label for="loginEmail">Email address</label>
                </div>

                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="loginPassword" placeholder="Password">
                    <label for="loginPassword">Password</label>
                </div>

                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="rememberMe">
                        <label class="form-check-label" for="rememberMe">
                            Remember me
                        </label>
                    </div>

                    <a href="#" class="text-decoration-none">Forgot?</a>
                </div>

                <button type="button" class="btn btn-primary w-100" onclick="showLoginMessage()">
                    Login
                </button>
            </form>

            <div id="loginMessage" class="mt-3 text-success fw-bold text-center"></div>

            <button class="btn btn-outline-primary w-100 mt-3" type="button" data-bs-toggle="collapse" data-bs-target="#loginHelp">
                Login Help
            </button>

            <div class="collapse mt-3" id="loginHelp">
                <div class="alert alert-info mb-0">
                    Use your registered email and password to access the dashboard.
                </div>
            </div>
        </div>

    </div>

    <script>
        function showLoginMessage() {
            document.getElementById("loginMessage").innerHTML = "Login button clicked successfully.";
        }
    </script>

    <script src="../../../js/bootstrap.bundle.min.js"></script>

</body>
</html>
