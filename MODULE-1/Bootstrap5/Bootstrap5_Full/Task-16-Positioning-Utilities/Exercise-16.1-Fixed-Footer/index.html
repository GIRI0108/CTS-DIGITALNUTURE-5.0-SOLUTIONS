<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed Footer</title>

    <link rel="stylesheet" href="../../../css/bootstrap.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            padding-bottom: 80px;
        }

        .header-box {
            background-color: white;
            border-radius: 10px;
        }

        .module-card {
            border-radius: 10px;
            min-height: 160px;
        }
    </style>
</head>
<body>

    <div class="container my-5">

        <div class="header-box shadow-sm p-4 mb-4">
            <h1 class="fw-bold text-primary">Student Learning Page</h1>
            <p class="text-muted fs-5 mb-0">
                A fixed footer remains visible at the bottom of the browser window.
            </p>
        </div>

        <div class="row g-4">
            <div class="col-12 col-md-4">
                <div class="card module-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold text-primary">Bootstrap</h4>
                        <p class="text-muted">Practice layout and utilities.</p>
                        <button class="btn btn-primary btn-sm">Open</button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card module-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold text-success">JavaScript</h4>
                        <p class="text-muted">Revise events and DOM.</p>
                        <button class="btn btn-success btn-sm">Start</button>
                    </div>
                </div>
            </div>

            <div class="col-12 col-md-4">
                <div class="card module-card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold text-warning">Core Java</h4>
                        <p class="text-muted">Prepare OOP and collections.</p>
                        <button class="btn btn-warning btn-sm">View</button>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <footer class="position-fixed bottom-0 start-0 w-100 bg-dark text-white text-center py-3 shadow">
        Student Portal Footer - Keep practicing daily
    </footer>

    <script src="../../../js/bootstrap.bundle.min.js"></script>

</body>
</html>
