<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Icons Footer</title>

    <link rel="stylesheet" href="../../../css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
        }

        .page-box {
            background-color: white;
            border-radius: 10px;
        }

        .social-icon {
            font-size: 24px;
            color: white;
            margin: 0 10px;
        }

        .social-icon:hover {
            color: #ffc107;
        }
    </style>
</head>
<body>

    <div class="container my-5">

        <div class="page-box shadow-sm p-4 mb-4">
            <h1 class="fw-bold text-primary">Student Portal</h1>
            <p class="text-muted fs-5 mb-0">
                Bootstrap Icons are used in the footer for social links.
            </p>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold text-primary">Courses</h4>
                        <p class="text-muted mb-0">Access learning modules.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold text-success">Practice</h4>
                        <p class="text-muted mb-0">Solve daily exercises.</p>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">
                        <h4 class="fw-bold text-warning">Reports</h4>
                        <p class="text-muted mb-0">View learning progress.</p>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <footer class="bg-dark text-white text-center py-4">
        <p class="mb-3">Connect with Student Portal</p>

        <a href="#" class="social-icon"><i class="bi bi-facebook"></i></a>
        <a href="#" class="social-icon"><i class="bi bi-twitter-x"></i></a>
        <a href="#" class="social-icon"><i class="bi bi-linkedin"></i></a>
        <a href="#" class="social-icon"><i class="bi bi-github"></i></a>
    </footer>

    <script src="../../../js/bootstrap.bundle.min.js"></script>

</body>
</html>
