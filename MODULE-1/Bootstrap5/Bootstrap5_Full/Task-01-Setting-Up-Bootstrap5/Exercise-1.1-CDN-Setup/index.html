<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5 CDN Setup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f7fb;
        }

        .main-card {
            max-width: 650px;
            margin: 80px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card main-card shadow border-0">
            <div class="card-body p-4">
                <h1 class="text-primary fw-bold">Bootstrap 5 CDN Setup</h1>

                <p class="lead text-muted">
                    This page is linked with Bootstrap 5 using CDN.
                </p>

                <button class="btn btn-primary" onclick="showMessage()">
                    Test Bootstrap
                </button>

                <p id="message" class="mt-3 text-success fw-bold"></p>
            </div>
        </div>
    </div>

    <script>
        function showMessage() {
            document.getElementById("message").innerHTML = "Bootstrap CDN setup is working successfully.";
        }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
